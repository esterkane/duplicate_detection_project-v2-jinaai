services:
  duplicate-detection:
    build:
      context: .
    image: duplicate-detection-jinaai:local
    env_file:
      - path: .env
        required: false
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - model-cache:/app/.cache
    restart: unless-stopped

  tests:
    build:
      context: .
    image: duplicate-detection-jinaai:local
    command: ["python", "-m", "pytest"]
    volumes:
      - .:/app
    profiles:
      - test

volumes:
  model-cache:
